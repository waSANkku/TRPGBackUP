<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>원클릭 롤20 스타일</title>
  <style>
    @font-face {
      font-family: 'Pretendard-Regular';
      src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Pretendard-Regular';
    }

    html, body {
      height: 100%;
      overflow: hidden;
      margin: 0;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 320px;
      padding: 20px 18px;
      background-color: #ffffff;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar h2 {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .sidebar > p {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      color: #6b7280;
    }

    .sidebar > hr {
      margin: 8px 0 4px;
      border: 0;
      border-top: 1px solid #e5e7eb;
    }

    .preview {
      flex: 1;
      height: 100%;
      overflow: auto;
      background-color: #1f1e22;
      color: white;
      padding: 10px;
      box-sizing: border-box;
    }

    #preview {
      width: 100%;
      height: 100%;
      border: none;
    }

    button {
      padding: 9px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background-color: #ffffff;
      color: #111827;
      transition: background-color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    button:hover {
      background-color: #f3f4f6;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.25);
    }

    .sidebar-tabs {
      display: flex;
      margin-top: 10px;
      border-radius: 999px;
      padding: 2px;
      background-color: #e5e7eb;
      gap: 2px;
    }

    .sidebar-tab {
      flex: 1;
      padding: 6px 0;
      font-size: 12px;
      background-color: transparent;
      border: none;
      cursor: pointer;
      text-align: center;
      border-radius: 999px;
      color: #6b7280;
    }

    .sidebar-tab.active {
      background-color: #2563eb;
      color: #f9fafb;
    }

    .tab-panel {
      margin-top: 10px;
      padding: 10px 10px 8px;
      border-radius: 10px;
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tab-panel.hidden {
      display: none;
    }

    label {
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: #374151;
    }

    label.checkbox-label {
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    .sidebar input[type="text"],
    .sidebar input[type="number"],
    .sidebar input[type="color"] {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      box-sizing: border-box;
      background-color: #ffffff;
      color: #111827;
    }

    .sidebar input[type="color"] {
      height: 36px;
      cursor: pointer;
    }

    .sidebar input[type="text"]:focus,
    .sidebar input[type="number"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35);
    }

    input[type="number"] {
      width: 60px;
      padding: 5px;
    }

    /* 사이드바가 flex 컬럼이라 세로 공간이 부족하면 overflow:hidden인 자식이
       min-height:auto -> 0 규칙 때문에 눌려서 잘리므로 shrink 금지 */
    #editor {
      flex-shrink: 0;
    }

    .CodeMirror {
      height: 100px !important;
      border-radius: 8px;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      margin-top: 4px;
    }

    #splitList {
      list-style: none;
      padding-left: 0;
      margin: 0;
      min-height: 90px;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background-color: #f9fafb;
    }

    #splitList li {
      padding: 6px 10px;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
      font-size: 12px;
    }
    #splitList li:hover {
      background-color: #eef2ff;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .color-row {
      display: flex;
      gap: 10px;
    }

    .color-row label {
      flex: 1;
      min-width: 0;
    }

    .undo-redo-row {
      display: flex;
      gap: 6px;
    }

    .save-row {
      display: flex;
      gap: 6px;
    }

    .save-row select {
      flex: 1;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      background-color: #ffffff;
      color: #111827;
    }

    .save-row button {
      flex: 1;
    }

    .undo-redo-row button {
      flex: 1;
      font-size: 12px;
      padding: 8px 4px;
    }

    .undo-redo-row button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .undo-redo-row button:disabled:hover {
      background-color: #ffffff;
      border-color: #d1d5db;
      box-shadow: none;
    }

    /* 이미지 설정 모달 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal-panel {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 16px;
      color: #111827;
    }

    .modal-close {
      border: none;
      background: transparent;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
    }

    .modal-list {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-row img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      background: #f3f4f6;
      flex-shrink: 0;
    }

    .image-modal-large-preview {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 8px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }

    .modal-row input[type="text"] {
      flex: 1;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      box-sizing: border-box;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .modal-row-thumb {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      width: 48px;
    }

    .modal-row-label {
      font-size: 10px;
      color: #6b7280;
      max-width: 56px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-panel-wide {
      width: 560px;
    }

    .css-preview-wrap {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      height: 140px;
      flex-shrink: 0;
    }

    .css-preview-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .css-target-sections {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .css-target-section {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background-color: #f9fafb;
    }

    .css-target-label {
      font-size: 12px;
      font-weight: 700;
      color: #374151;
    }

    .css-prop-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }

    .css-prop-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .css-prop-row .css-prop-name {
      flex: 0 0 38%;
    }

    .css-prop-row .css-prop-value {
      flex: 1;
      min-width: 0;
    }

    .css-prop-row input[type="text"] {
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      box-sizing: border-box;
    }

    .css-prop-row input[type="color"] {
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .css-prop-remove {
      flex-shrink: 0;
      padding: 4px 8px;
      font-size: 11px;
    }

    .css-add-prop-btn {
      align-self: flex-start;
    }
  </style>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <!-- ✅ CodeMirror 5 CSS & JS CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>

  <!-- ✅ 선택적으로 HTML 모드 추가 (사용자 HTML 편집용이라면) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const dropZone = document.getElementById("dropZone");
      const previewArea = document.getElementById("previewArea");

    });

    $(document).ready(function () {
      editor = CodeMirror.fromTextArea($(".codemirror-textarea")[0], {
        lineNumbers: true,
        mode: "htmlmixed"
      });

      // 2. 붙여넣기 시 기본 text/plain 삽입 차단 (코어 레벨)
      CodeMirror.on(editor, "beforeChange", function (instance, changeObj) {
        if (changeObj.origin === "paste" && changeObj.text && changeObj.text.length > 1) {
          // 기본 붙여넣기 텍스트 제거
          changeObj.cancel();
        }
      });

      editor.getWrapperElement().addEventListener('paste', function (e) {
        e.preventDefault(); // 💥 항상 붙여넣기 기본 동작 막기

        // 클립보드에서 HTML 데이터 추출
        const htmlData = e.clipboardData.getData('text/html');

        // HTML 데이터가 존재하면 기본 붙여넣기 방지하고 직접 삽입
        if (htmlData) {
          e.preventDefault();
          const doc = editor.getDoc();
          const cursor = doc.getCursor();
          doc.replaceRange(extractFragment(htmlData), cursor);
        }
        // HTML이 없을 경우 기존 기본 동작 유지 (text/plain)
      });



      // HTML 복사 버튼
      document.getElementById('copyHTMLBtn').addEventListener('click', () => {
        const html = getIframeHTML();
        navigator.clipboard.writeText(html).then(() => {
          alert('HTML이 복사되었습니다.');
        }).catch(err => {
          alert('복사 실패: ' + err);
        });
      });

      // 저장 버튼: select에서 고른 확장자(HTML/TXT)로 저장. 내용은 항상 동일한 HTML 마크업이고
      // TXT는 그 HTML을 텍스트 그대로 .txt 확장자로 담아내는 것뿐(별도로 텍스트만 추출하지 않음).
      document.getElementById('saveBtn').addEventListener('click', () => {
        const filename = document.getElementById('filenameInput').value.trim() || 'roll20-wrap';
        const format = document.getElementById('saveFormatSelect').value;
        const html = getIframeHTML();

        const blob = new Blob([html], { type: format === 'txt' ? 'text/plain' : 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename + '.' + format;
        a.click();
        URL.revokeObjectURL(a.href);
      });

      // 사이드바 탭 전환
      $(".sidebar-tab").on("click", function () {
        const targetId = $(this).data("target");
        $(".sidebar-tab").removeClass("active");
        $(this).addClass("active");
        $(".tab-panel").addClass("hidden");
        $("#" + targetId).removeClass("hidden");
      });

      // 되돌리기 / 앞으로가기
      $("#undoBtn").on("click", undoEdit);
      $("#redoBtn").on("click", redoEdit);
      $(document).on("keydown", (e) => {
        const isCtrl = e.ctrlKey || e.metaKey;
        if (!isCtrl) return;
        // CodeMirror 안에 포커스가 있을 땐 CodeMirror 자체 되돌리기를 쓰도록 비켜준다
        if (document.activeElement && document.activeElement.closest && document.activeElement.closest('.CodeMirror')) return;

        if (e.key === 'z' || e.key === 'Z') {
          e.preventDefault();
          undoEdit();
        } else if (e.key === 'y' || e.key === 'Y') {
          e.preventDefault();
          redoEdit();
        }
      });

      // 이미지 설정 모달 (버튼 클릭 시엔 항상 전체 목록 모드)
      $("#imageSettingsBtn").on("click", () => openImageSettingsModal());
      $("#imageModalCloseBtn").on("click", closeImageSettingsModal);
      // 단일 모드(이미지 직접 클릭)일 땐 "적용"이 이 이미지 하나만, 전체 목록 모드일 땐 항상 일괄 반영
      $("#imageModalApplyBtn").on("click", () => {
        if (imageModalSingleTargetEl) applySingleImageOnly();
        else applyImageSettings();
      });
      $("#imageModalApplyAllBtn").on("click", applyImageSettings);

      // CSS 편집 모달 (섹션별 "+ 속성 추가" 버튼은 openCssModal에서 동적으로 바인딩됨)
      $("#cssModalCloseBtn").on("click", closeCssModal);
      $("#cssModalApplyBtn").on("click", () => applyCssModal(false));
      $("#cssModalApplyAllBtn").on("click", () => applyCssModal(true));



      $("#applyStyleBtn").on("click", function () {
        const htmlCode = editor.getValue();
        const iframe = document.getElementById("preview");
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        let lineH = $("#paddingInput").val();
        doc.open();
        doc.write(htmlCode);
        doc.close();

        // 메시지만 추출해서 전체 분할 데이터 초기화
          const messages = Array.from(doc.querySelectorAll('.message'));
          const totalCount = messages.length;
          const fullHtml = messages.map(m => m.outerHTML).join('\n');

          splitHtmls = {};
          currentSplitKey = `1-${totalCount}`;
          splitHtmls[currentSplitKey] = fullHtml;

          updateSplitListUI();
        // 렌더 완료 후 스타일 적용
        iframe.onload = () => {

          // ✅ 기본 스타일 적용
          const style = doc.createElement("style");
          style.textContent = `
                
                  @font-face {
                    font-family: 'Pretendard-Regular';
                    src: url('https://fastly.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');
                    font-weight: 400;
                    font-style: normal;
                  }
                  @font-face {
                    font-family: 'DPoly Twenty-Sider';
                    src: url('https://db.onlinewebfonts.com/t/d1dad091c9d8f5250516cf661b68379e.woff2') format('woff2'),
                        url('https://db.onlinewebfonts.com/t/d1dad091c9d8f5250516cf661b68379e.woff') format('woff'),
                        url('https://db.onlinewebfonts.com/t/d1dad091c9d8f5250516cf661b68379e.ttf') format('truetype');
                    font-weight: normal;
                    font-style: normal;
                    }

                  body {
                    font-family: 'Pretendard-Regular';
                  }
                  * {
                    line-height: ${lineH} !important;
                  }
                    .inlinerollresult{
                    line-height: 2.5 !important;
                    }
                    .sheet-dice-val:before {
                    content: 't';
                    font-family: 'DPoly Twenty-Sider';
                    font-size: 2em;
                    display: block;
                    position: absolute;
                    top: 50%;
                    left: 55%;
                    opacity: .3;
                    z-index: -1;
                    transform: translate(-50%, -50%);
                    -webkit-transform: translate(-50%, -50%);
                    }
                                        
                    .sheet-detail-dice > *:before {
                        content: 't';
                        font-family: 'DPoly Twenty-Sider';
                        font-weight: 900;
                        display: block;
                        position: absolute;
                        top: 50%;
                        left: 65%;
                        font-size: 1.5em;
                        opacity: .5;
                        z-index: -1;
                        transform: translate(-50%, -50%);
                        -webkit-transform: translate(-50%, -50%);
                    }
                   .sheet-target-result > *:before {
                        content: '';
                        display: block;
                        position: absolute;
                        top: 0;
                        bottom: 0;
                        left: 0;
                        right: 0;
                        z-index: -1;
                        background: linear-gradient(90deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 100%);
                    }    
                    span.inlinerollresult.showtip{
                        border: 0px !important;
                    }
                    `;
          doc.head.appendChild(style);


          if (document.getElementById("colorUnifyCheckbox").checked) {
            doc.querySelectorAll(".you").forEach(el => {
              el.style.backgroundColor = "rgb(241, 241, 241)";
            });
            doc.querySelectorAll(".you > .spacer").forEach(el => {
              el.style.backgroundColor = "rgb(225, 225, 225)";
            });
          }

          if (document.getElementById("tableWidthCheckbox").checked) {
            doc.querySelectorAll("div.message.general table").forEach(table => {
              table.style.setProperty("width", "100%", "important");
            });
          }

          if (document.getElementById("removeApiCheckbox").checked) {
            // ⚠️ API 에코 메시지 삭제와 "연속 발화자 병합"을 한 패스로 같이 처리한다.
            // 예전엔 API 메시지를 먼저 통째로 지운 뒤 남은 .message들만 보고 병합 여부를 판단했는데,
            // 그러면 [Alice → Bob의 API 명령(삭제됨) → Alice] 같은 경우 Bob이 있었다는 사실을
            // 잃어버리고 두 Alice 메시지를 "연속 발화"로 착각해 잘못 병합해버렸다.
            // 지워지는 메시지 자신의 화자를 먼저 확인해서 화자가 바뀌면 흐름을 끊도록 고침.
            let lastSpeaker = null;

            Array.from(doc.querySelectorAll(".message")).forEach(message => {
              const graySpan = Array.from(message.querySelectorAll("span")).find(
                span => span.style.color === "rgb(170, 170, 170)"
              );

              if (graySpan) {
                const ownBySpan = message.querySelector("span.by");
                const ownSpeaker = ownBySpan ? ownBySpan.textContent.trim() : null;
                // 이 API 메시지의 화자가 방금 화자와 다르거나(또는 알 수 없으면) 흐름이 끊긴 것
                if (!ownSpeaker || ownSpeaker !== lastSpeaker) {
                  lastSpeaker = null;
                }
                message.remove();
                return;
              }

              // 만약 desc면 speaker 흐름을 끊는다 (lastSpeaker 무효화)
              if (message.classList.contains("desc")) {
                lastSpeaker = null;
                return;
              }

              const bySpan = message.querySelector("span.by");
              const avatar = message.querySelector("div.avatar");
              const currentSpeaker = bySpan ? bySpan.textContent.trim() : null;

              if (currentSpeaker && currentSpeaker === lastSpeaker) {
                // ✅ 연속 발화자 → spacer 제거
                const spacer = message.querySelector(".spacer");
                if (spacer) spacer.remove();
                if (bySpan) bySpan.remove();
                // ✅ 이름(span.by)도 제거
                if (avatar) avatar.remove();
              }

              if (currentSpeaker) {
                lastSpeaker = currentSpeaker;
              }
              // 화자가 없으면 lastSpeaker 유지
            });
          }

          if (document.getElementById("ownerInput").value.trim() !== "") {


            const targets = document.getElementById("ownerInput").value
              .split(",")
              .map(t => t.trim())
              .filter(t => t !== "");

            let deletingSpeaker = null;  // 현재 삭제 중인 스피커

            doc.querySelectorAll(".message").forEach(message => {
              // 메시지 div에 'desc' 클래스가 있으면 삭제 제외
              if (message.classList.contains("desc")) {
                // 삭제 대상 아님, 다음으로 넘어감
                deletingSpeaker = null;
                return;
              }

              const bySpan = message.querySelector("span.by");

              if (bySpan) {
                const speaker = bySpan.textContent.trim();

                if (targets.some(name => speaker.includes(name))) {
                  // 대상 스피커라면 삭제 시작
                  deletingSpeaker = speaker;
                  message.remove();
                } else {
                  // 대상 스피커 아니면 삭제 중지
                  deletingSpeaker = null;
                }
              } else {
                // span.by 없으면 연속 발화 메시지 판단
                if (deletingSpeaker !== null) {
                  message.remove();
                }
              }
            });
          }



          if (document.getElementById("removeHiddenMessageCheckbox").checked) {
            doc.querySelectorAll("div.hidden-message").forEach(el => el.remove());
          }

          const inputText = document.getElementById("systemJournalInput").value.trim();
          if (inputText) {
            const messages = Array.from(doc.querySelectorAll("div.message"));
            let i = 0;

            while (i < messages.length) {
              const current = messages[i];

              const classList = current.classList;
              const hasSpacer = current.querySelector(".spacer") !== null;

              // whisper 또는 private 클래스가 있는 경우 제외
              if (classList.contains("whisper") || classList.contains("private")) {
                i++;
                continue;
              }

              if (hasSpacer && current.textContent.includes(inputText)) {
                const toConvert = [];
                toConvert.push(current);

                // 연속된 spacer 없는 메시지들 수집
                let j = i + 1;
                while (j < messages.length && !messages[j].querySelector(".spacer")) {
                  toConvert.push(messages[j]);
                  j++;
                }

                // ✅ 개별 메시지로 desc 생성
                toConvert.forEach(orig => {
                  let text = "";

                  const bySpan = orig.querySelector("span.by");
                  if (bySpan && bySpan.nextSibling) {
                    text = bySpan.nextSibling.textContent.trim();
                  } else {
                    text = orig.textContent.trim();
                  }

                  // orig 자신의 렌더링 스타일(폰트/사이즈/색상)을 그대로 물려받아 만든다
                  const descDiv = createDescDiv(doc, orig, text);

                  orig.parentNode.insertBefore(descDiv, orig);
                  orig.remove();
                });

                i = j;
              } else {
                i++;
              }
            }
          }


          // 귓속말 배경/글자색
          const whisperColor = document.getElementById("whisperColorInput").value || "#000000";
          const whisperBColor = document.getElementById("whisperBColorInput").value || "#ddd";
          const whisperBSpacerColor = darkenColor(whisperBColor, 12); // 밝기 차이 조절

          doc.querySelectorAll('.whisper').forEach(whisper => {
            // 귓속말 배경색
            whisper.style.backgroundColor = whisperBColor;
            whisper.style.color = whisperColor;
          });
          //귓속말 선색
          doc.querySelectorAll(".whisper > .spacer").forEach(el => {
            el.style.backgroundColor = whisperBSpacerColor;
          });

          const emoteColor = document.getElementById("emoteColorInput").value || "#653e10";
          const emoteBColor = document.getElementById("emoteBColorInput").value || "#d3cbb6";
          const emoteBSpacerColor = darkenColor(emoteBColor, 12); // 밝기 차이 조절

          //emas 배경색
          doc.querySelectorAll('.emote').forEach(emote => {
            emote.style.backgroundColor = emoteBColor;
            emote.style.color = emoteColor;
          });
          //emas 선색
          doc.querySelectorAll(".emote > .spacer").forEach(el => {
            el.style.backgroundColor = emoteBSpacerColor;
          });

          // 메시지 hover 버튼/더블클릭 편집/이미지 클릭 등 상호작용 바인딩
          // (되돌리기·앞으로가기로 복원할 때도 그대로 재사용하므로 체크박스 기반 일괄 변환은 여기 넣지 않음)
          bindMessageInteractions(doc);

          // 최초 렌더 결과를 되돌리기 히스토리 시작점으로 기록
          pushHistorySnapshot();
        }

      });

    });

    // 삭제/분할/CSS 가상 버튼(hover 위치 이동), 더블클릭 편집, 이미지 클릭, 붙여넣기 이미지 등
    // "상호작용"만 담당하는 함수. 체크박스 기반 일괄 변환은 포함하지 않아 되돌리기 복원 시 안전하게 재호출 가능.
    function bindMessageInteractions(doc) {
      let hoveredMessage = null;

      // 미리보기(iframe)는 바깥 document와 별개라 outer keydown 리스너가 안 먹는다.
      // iframe 문서가 새로 그려질 때마다(최초 적용/되돌리기 복원 시) 여기서 다시 바인딩.
      doc.addEventListener('keydown', (e) => {
        const isCtrl = e.ctrlKey || e.metaKey;
        if (!isCtrl) return;
        const active = doc.activeElement;
        if (active && active.getAttribute && active.getAttribute('contenteditable') === 'true') return;

        if (e.key === 'z' || e.key === 'Z') {
          e.preventDefault();
          undoEdit();
        } else if (e.key === 'y' || e.key === 'Y') {
          e.preventDefault();
          redoEdit();
        }
      });

      const delBtn = doc.createElement('button');
      delBtn.textContent = '✕';
      delBtn.style.cssText = `
        position: fixed;
        width: 24px;
        height: 24px;
        background: rgba(255, 50, 50, 0.8);
        border: none;
        color: white;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 50%;
        cursor: pointer;
        display: none;
        z-index: 9999;
      `;

      const splitBtn = doc.createElement('button');
      splitBtn.textContent = '분할';
      splitBtn.className = 'split-btn';
      splitBtn.style.cssText = `
        position: fixed;
        background: rgba(50, 100, 255, 0.8);
        border: none;
        color: white;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        cursor: pointer;
        display: none;
        z-index: 9999;
      `;

      const cssBtn = doc.createElement('button');
      cssBtn.textContent = 'CSS';
      cssBtn.className = 'css-btn';
      cssBtn.style.cssText = `
        position: fixed;
        background: rgba(34, 150, 90, 0.85);
        border: none;
        color: white;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        cursor: pointer;
        display: none;
        z-index: 9999;
      `;

      const addBtn = doc.createElement('button');
      addBtn.textContent = '추가';
      addBtn.className = 'add-btn';
      addBtn.style.cssText = `
        position: fixed;
        background: rgba(150, 90, 220, 0.85);
        border: none;
        color: white;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        cursor: pointer;
        display: none;
        z-index: 9999;
      `;

      doc.body.appendChild(delBtn);
      doc.body.appendChild(splitBtn);
      doc.body.appendChild(cssBtn);
      doc.body.appendChild(addBtn);

      function positionMessageButtons(msg) {
        const rect = msg.getBoundingClientRect();
        delBtn.style.top = (rect.top + 5) + 'px';
        delBtn.style.left = (rect.right - 30) + 'px';
        splitBtn.style.top = (rect.top + 5) + 'px';
        splitBtn.style.left = (rect.right - 68) + 'px';
        cssBtn.style.top = (rect.top + 5) + 'px';
        cssBtn.style.left = (rect.right - 106) + 'px';
        addBtn.style.top = (rect.top + 5) + 'px';
        addBtn.style.left = (rect.right - 144) + 'px';
        delBtn.style.display = 'block';
        splitBtn.style.display = 'block';
        cssBtn.style.display = 'block';
        addBtn.style.display = 'block';
      }

      function hideMessageButtons() {
        delBtn.style.display = 'none';
        splitBtn.style.display = 'none';
        cssBtn.style.display = 'none';
        addBtn.style.display = 'none';
        hoveredMessage = null;
      }

      doc.addEventListener('mouseover', (e) => {
        const msg = e.target.closest('.message');
        if (msg) {
          hoveredMessage = msg;
          positionMessageButtons(msg);
        } else if (!e.target.closest('.split-btn') && !e.target.closest('.css-btn') && !e.target.closest('.add-btn') && e.target !== delBtn) {
          hideMessageButtons();
        }
      });

      splitBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (!hoveredMessage) return;
        splitAtMessageIndex(doc, hoveredMessage);
        hideMessageButtons();
      });

      cssBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (!hoveredMessage) return;
        openCssModal(hoveredMessage);
        hideMessageButtons();
      });

      addBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (!hoveredMessage) return;
        insertDescMessageAfter(doc, hoveredMessage);
        hideMessageButtons();
      });

      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!hoveredMessage) return;
        // (선택) 이전 요소가 <hr>이면 같이 삭제
        const prev = hoveredMessage.previousElementSibling;
        if (prev && prev.tagName === 'HR') {
          prev.remove();
        }
        hoveredMessage.remove();
        hideMessageButtons();
        // 삭제 후 현재 분할 구간 내용 저장 갱신
        saveCurrentSplitList();
      });

      // 메시지 내 이미지(아바타 + desc 안에 <a><img></a>로 붙여넣어진 이미지 등) 클릭 시
      // 링크 이동 대신 단일 이미지 변경 팝업을 띄움
      doc.addEventListener('click', (e) => {
        const img = e.target.closest('.message img');
        if (img) {
          e.preventDefault();
          e.stopPropagation();
          openImageSettingsModal(img.getAttribute('src'), img);
        }
      });

      // 더블클릭 수정 (새로 추가되는 desc 메시지에도 재사용하기 위해 per-message 바인딩 함수로 분리)
      doc.querySelectorAll('.message').forEach(span => bindSingleMessageEdit(doc, span));
    }

    // 메시지 하나에 더블클릭 편집 + 이미지 붙여넣기 동작을 붙인다.
    // bindMessageInteractions의 초기 일괄 바인딩과, "추가" 버튼으로 새로 삽입한 메시지 양쪽에서 재사용.
    function bindSingleMessageEdit(doc, span) {
      span.addEventListener('dblclick', () => {
        span.setAttribute('contenteditable', 'true');
        span.focus();
      });
      span.addEventListener('blur', () => {
        span.removeAttribute('contenteditable');
        saveCurrentSplitList();

      });
       span.addEventListener('keydown', (e) => {
       if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          span.blur(); // 수정 종료
        }
      });
      // ✅ 붙여넣기 이미지 처리(0628)
      span.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;

        for (let i = 0; i < items.length; i++) {
          const item = items[i];

          if (item.type.indexOf('image') !== -1) {
            e.preventDefault(); // base64 삽입 방지

            const file = item.getAsFile();
            const reader = new FileReader();

            reader.onload = (event) => {
              // canvas로 WebP로 압축
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                const webpDataUrl = canvas.toDataURL('image/webp', 0.5); // 품질 조정 가능
                const imageEl = document.createElement('img');
                imageEl.src = webpDataUrl;

                // ✅ 너비 100% 추가
                imageEl.style.width = '100%';

                span.appendChild(imageEl);
              };
              img.src = event.target.result;
            };

            reader.readAsDataURL(file); // 최초는 base64지만 압축해서 재삽입
            break; // 하나만 처리
          }
        }
      });
    }

    // desc(서술) 스타일 메시지 div를 새로 만든다. 색상/패딩 같은 desc 고유 스타일은 고정값이지만,
    // font-family/font-size/color는 refMsg의 실제 계산된(computed) 스타일을 그대로 가져와 적용한다.
    // (직접 만든 div는 원본 로그의 CSS를 못 물려받아서 기본값으로 떨어지는 바람에 폰트/글자색이
    //  주변 메시지와 안 맞아 보이던 문제 수정)
    function createDescDiv(doc, refMsg, text) {
      const msgId = "descmsg-" + Date.now() + Math.floor(Math.random() * 1000);
      const ref = refMsg ? doc.defaultView.getComputedStyle(refMsg) : null;
      const fontFamily = ref ? ref.fontFamily : '';
      const fontSize = ref ? ref.fontSize : '';
      const color = ref ? ref.color : '';

      const descDiv = doc.createElement("div");
      descDiv.className = "message desc";
      descDiv.setAttribute("data-messageid", msgId);
      descDiv.setAttribute("style",
        `box-sizing: content-box; padding-left: 15px; padding-right: 16px; padding-bottom: 7px; background-color: rgb(241, 241, 241); position: relative; font-style: italic; font-weight: bold; text-align: center; font-family: ${fontFamily}; font-size: ${fontSize}; color: ${color};`);
      descDiv.innerHTML = `
            <div class="spacer" style="box-sizing: content-box; background-color: rgb(225, 225, 225); height: 2px; margin-bottom: 7px; margin-left: -15px; margin-right: -12px;"></div>
            ${text}
            <div id="menu-${msgId}" class="flyout" style="box-sizing: content-box; position: absolute; cursor: pointer; height: 24px; width: 2px; right: 10px; top: 0px;"></div>
          `;
      return descDiv;
    }

    // 클릭한 메시지 바로 다음에 새 desc(서술) 메시지를 만들어 끼워넣고 바로 편집 모드로 진입시킨다.
    function insertDescMessageAfter(doc, afterMsg) {
      const descDiv = createDescDiv(doc, afterMsg, '새 서술');

      afterMsg.parentNode.insertBefore(descDiv, afterMsg.nextSibling);
      bindSingleMessageEdit(doc, descDiv);
      saveCurrentSplitList();

      // 바로 편집할 수 있게 편집 모드로 진입
      descDiv.setAttribute('contenteditable', 'true');
      descDiv.focus();
    }

    function darkenColor(hex, amount = 15) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.max(0, (num >> 16) - amount);
      const g = Math.max(0, ((num >> 8) & 0x00FF) - amount);
      const b = Math.max(0, (num & 0x0000FF) - amount);
      return `rgb(${r}, ${g}, ${b})`;
    }

    // ─── CSS 편집 (분할 버튼 옆 CSS 버튼으로 여는 팝업) ───────────────
    // 메시지 div 자신뿐 아니라, 그 안에 style 속성을 가진 자식 요소들(예: desc 안의 장식용 <a> 여러 개)도
    // 각각 별도 섹션으로 불러와 속성을 자유 편집 + 실시간 미리보기.
    // "일괄적용"은 각 섹션이 열었을 때 갖고 있던 원본 style과 정확히 같은 style을 쓰는 다른 요소를
    // (태그/클래스 무관하게) 전부 찾아 새 CSS로 바꿔준다.
    let cssModalMsg = null; // 현재 CSS 버튼으로 연 메시지 div (iframe 내부 요소, 미리보기 클론용)
    let cssModalTargets = []; // [{ el, originalStyle, rowsList }]

    function rgbToHex(rgb) {
      if (!rgb) return '#000000';
      if (rgb.startsWith('#')) return rgb;
      const nums = rgb.match(/\d+/g);
      if (!nums) return '#000000';
      return '#' + nums.slice(0, 3).map(n => Number(n).toString(16).padStart(2, '0')).join('');
    }

    function describeCssTargetElement(el) {
      const text = (el.textContent || '').trim().slice(0, 24);
      return `<${el.tagName.toLowerCase()}>${text ? ' ' + text : ''}`;
    }

    function createCssPropRow(name, value) {
      const row = document.createElement('div');
      row.className = 'css-prop-row';

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.className = 'css-prop-name';
      nameInput.placeholder = '속성명';
      nameInput.value = name;

      const valueInput = document.createElement('input');
      valueInput.type = 'text';
      valueInput.className = 'css-prop-value';
      valueInput.placeholder = '값';
      valueInput.value = value;

      const colorInput = document.createElement('input');
      colorInput.type = 'color';
      const isColorProp = /color/i.test(name);
      colorInput.style.display = isColorProp ? '' : 'none';
      if (isColorProp) colorInput.value = rgbToHex(value);

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'css-prop-remove';
      removeBtn.textContent = '✕';

      nameInput.addEventListener('input', () => {
        colorInput.style.display = /color/i.test(nameInput.value) ? '' : 'none';
        refreshCssPreview();
      });
      valueInput.addEventListener('input', () => {
        if (colorInput.style.display !== 'none') colorInput.value = rgbToHex(valueInput.value);
        refreshCssPreview();
      });
      colorInput.addEventListener('input', () => {
        valueInput.value = colorInput.value;
        refreshCssPreview();
      });
      removeBtn.addEventListener('click', () => {
        row.remove();
        refreshCssPreview();
      });

      row.append(nameInput, valueInput, colorInput, removeBtn);
      return row;
    }

    function buildStyleStringFromRows(rowsList) {
      const parts = [];
      rowsList.querySelectorAll('.css-prop-row').forEach(row => {
        const name = row.querySelector('.css-prop-name').value.trim();
        const value = row.querySelector('.css-prop-value').value.trim();
        if (name && value) parts.push(`${name}: ${value}`);
      });
      return parts.length ? parts.join('; ') + ';' : '';
    }

    function createCssTargetSection(label, originalStyle) {
      const section = document.createElement('div');
      section.className = 'css-target-section';

      const labelEl = document.createElement('div');
      labelEl.className = 'css-target-label';
      labelEl.textContent = label;

      const rowsList = document.createElement('div');
      rowsList.className = 'css-prop-list';

      const declarations = originalStyle.split(';').map(s => s.trim()).filter(Boolean);
      if (declarations.length === 0) {
        rowsList.appendChild(createCssPropRow('', ''));
      } else {
        declarations.forEach(decl => {
          const idx = decl.indexOf(':');
          if (idx === -1) return;
          rowsList.appendChild(createCssPropRow(decl.slice(0, idx).trim(), decl.slice(idx + 1).trim()));
        });
      }

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'css-add-prop-btn';
      addBtn.textContent = '+ 속성 추가';
      addBtn.addEventListener('click', () => {
        rowsList.appendChild(createCssPropRow('', ''));
        refreshCssPreview();
      });

      section.append(labelEl, rowsList, addBtn);
      return { section, rowsList };
    }

    // 미리보기 iframe에 msg를 통째로 복제해 넣고, 각 섹션에서 편집 중인 style을
    // 복제본의 대응 노드(원래와 같은 순서로 [style] 탐색)에 반영해서 보여준다.
    function refreshCssPreview() {
      if (!cssModalMsg) return;
      const previewFrame = document.getElementById('cssPreviewFrame');
      const pdoc = previewFrame.contentDocument || previewFrame.contentWindow.document;

      const clone = cssModalMsg.cloneNode(true);
      clone.querySelectorAll('button').forEach(b => b.remove());

      clone.setAttribute('style', buildStyleStringFromRows(cssModalTargets[0].rowsList));
      const cloneStyled = clone.querySelectorAll('[style]');
      cssModalTargets.slice(1).forEach((target, i) => {
        if (cloneStyled[i]) {
          cloneStyled[i].setAttribute('style', buildStyleStringFromRows(target.rowsList));
        }
      });

      const headHtml = cssModalMsg.ownerDocument.head.innerHTML;
      pdoc.open();
      pdoc.write(`<!DOCTYPE html><html><head>${headHtml}</head><body style="margin:0;padding:10px;background:#1f1e22;">${clone.outerHTML}</body></html>`);
      pdoc.close();
    }

    function openCssModal(msg) {
      cssModalMsg = msg;
      cssModalTargets = [];

      const container = document.getElementById('cssTargetSections');
      container.innerHTML = '';

      // msg 자신 + style 속성을 가진 모든 자식(중첩 상관없이)을 각각 섹션으로
      const rawTargets = [msg, ...msg.querySelectorAll('[style]')];
      rawTargets.forEach(el => {
        const originalStyle = el.getAttribute('style') || '';
        const label = el === msg ? '메시지 전체 (.message)' : describeCssTargetElement(el);
        const { section, rowsList } = createCssTargetSection(label, originalStyle);
        container.appendChild(section);
        cssModalTargets.push({ el, originalStyle, rowsList });
      });

      document.getElementById('cssModalOverlay').classList.remove('hidden');
      refreshCssPreview();
    }

    function closeCssModal() {
      document.getElementById('cssModalOverlay').classList.add('hidden');
      cssModalMsg = null;
      cssModalTargets = [];
    }

    // splitHtmls 문자열 조각 안에서 원본 style과 정확히 같은 style을 쓰는 요소(태그 무관)를 전부 치환
    function replaceStyleInHtmlString(htmlStr, originalStyle, newStyle) {
      const parsed = new DOMParser().parseFromString(`<div>${htmlStr}</div>`, 'text/html');
      const container = parsed.body.firstChild;
      container.querySelectorAll('[style]').forEach(el => {
        if ((el.getAttribute('style') || '') === originalStyle) {
          el.setAttribute('style', newStyle);
        }
      });
      return container.innerHTML;
    }

    // bulk=true면 각 섹션이 열렸을 때와 동일한 style을 쓰던 다른 요소들(태그/클래스 무관)까지 전부 새 CSS로 변경.
    // originalStyle이 빈 문자열(style 없던 요소)인 섹션은 매칭 대상이 너무 광범위해지므로 일괄적용에서 제외.
    function applyCssModal(bulk) {
      if (!cssModalMsg || cssModalTargets.length === 0) {
        closeCssModal();
        return;
      }

      const iframe = document.getElementById('preview');
      const doc = iframe.contentDocument || iframe.contentWindow.document;

      cssModalTargets.forEach(target => {
        const newStyle = buildStyleStringFromRows(target.rowsList);
        target.el.setAttribute('style', newStyle);

        if (bulk && target.originalStyle) {
          doc.querySelectorAll('[style]').forEach(el => {
            if (el !== target.el && el.getAttribute('style') === target.originalStyle) {
              el.setAttribute('style', newStyle);
            }
          });
          Object.keys(splitHtmls).forEach(key => {
            splitHtmls[key] = replaceStyleInHtmlString(splitHtmls[key], target.originalStyle, newStyle);
          });
        }
      });

      saveCurrentSplitList();
      closeCssModal();
    }

    // iframe에서 HTML 문자열 가져오기 함수
    function getIframeHTML() {
      const iframe = document.getElementById('preview');
      const doc = iframe.contentDocument || iframe.contentWindow.document;

    // ✅ 원본 훼손 방지: documentElement 복제
    const clone = doc.documentElement.cloneNode(true);

    // ✅ 분할 버튼 제거
    clone.querySelectorAll('button.split-btn, button.css-btn, button.add-btn').forEach(btn => btn.remove());

    // ✅ 삭제 버튼(✕) 제거
    clone.querySelectorAll('button').forEach(btn => {
      if (btn.textContent === '✕') btn.remove();
    });
  // 복제한 노드의 HTML 문자열 반환
    return clone.outerHTML;
    }

    function extractFragment(html) {
      const START = '<!--StartFragment-->';
      const END = '<!--EndFragment-->';

      const startIndex = html.indexOf(START);
      const endIndex = html.indexOf(END);

      if (startIndex === -1 || endIndex === -1) {
        // 마커가 없으면 전체 리턴 (fallback)
        return html;
      }

      return html.substring(startIndex + START.length, endIndex);
    }


    // 전역 변수
    let splitHtmls = {};
    let currentSplitKey = '';
    // 분할 처리 함수 - 클릭한 메시지 기준으로 분할
      
    function splitAtMessageIndex(doc, clickedMsg) {
      const messages = Array.from(doc.querySelectorAll('.message'));
      const idx = messages.indexOf(clickedMsg);
      if (idx === -1) return;

      // 앞부분, 뒷부분 메시지 분리
      const part1 = messages.slice(0, idx + 1);
      const part2 = messages.slice(idx + 1);

      // outerHTML 합치기
      const htmlPart1 = part1.map(m => m.outerHTML).join('\n');
      const htmlPart2 = part2.map(m => m.outerHTML).join('\n');

      // 기존 현재 분할 키 삭제
      if (currentSplitKey && splitHtmls[currentSplitKey]) {
        delete splitHtmls[currentSplitKey];
      }

      // 새로운 분할 키 생성
      const total = messages.length;
      const key1 = `1-${idx + 1}`;
      const key2 = `${idx + 2}-${total}`;

      // 분할 데이터 저장
      splitHtmls[key1] = htmlPart1;
      splitHtmls[key2] = htmlPart2;

      // 현재 키를 첫 파트로 설정 (예: 1~idx+1)
      currentSplitKey = key1;

      // 리스트 UI 갱신
      updateSplitListUI();

       // 첫 번째 분할 구간 iframe에 로드 + 스크롤 최상단 이동
      loadHTMLtoIframe(htmlPart1);
      const iframe = document.getElementById('preview');
      iframe.contentWindow.scrollTo(0, 0);
    }

    function updateSplitListUI() {
      const splitList = document.getElementById('splitList');
      splitList.innerHTML = ''; // 초기화

      Object.entries(splitHtmls).forEach(([key, html],i ) => {
        const li = document.createElement('li');
          li.textContent = `(${i + 1})`;  // (1), (2), (3) ... 순서대로 표시

        li.style.userSelect = 'none';
        li.style.cursor = 'pointer';

        li.addEventListener('click', () => {
          loadHTMLtoIframe(html);
          currentSplitKey = key;
        });

        splitList.appendChild(li);
      });
    }

    function saveCurrentSplitList() {
      const iframe = document.getElementById('preview');
      const doc = iframe.contentDocument || iframe.contentWindow.document;

      if (!currentSplitKey) return;

      const messages = Array.from(doc.querySelectorAll('.message'));
      const html = messages.map(m => m.outerHTML).join('\n');

      splitHtmls[currentSplitKey] = html;
      editor.setValue(html);

      console.log(`현재 분할 구간(${currentSplitKey}) 내용 저장됨`);
      updateSplitListUI();
      pushHistorySnapshot();
    }

    // ─── 되돌리기(Ctrl+Z) / 앞으로가기(Ctrl+Y) ───────────────
    // 미리보기(iframe)의 완성된 HTML 스냅샷을 스택으로 쌓아두고, 되돌릴 땐 그 스냅샷을 다시
    // 그려 넣은 뒤 상호작용(hover 버튼 등)만 재바인딩한다. 체크박스 일괄 변환은 다시 실행하지 않는다.
    let editHistory = [];
    let editHistoryIndex = -1;
    let isRestoringHistory = false;

    function pushHistorySnapshot() {
      if (isRestoringHistory) return;
      const snapshot = getIframeHTML();
      editHistory = editHistory.slice(0, editHistoryIndex + 1);
      editHistory.push(snapshot);
      editHistoryIndex = editHistory.length - 1;
      updateUndoRedoButtons();
    }

    function restoreHistorySnapshot(index) {
      if (index < 0 || index >= editHistory.length) return;
      isRestoringHistory = true;
      editHistoryIndex = index;

      const iframe = document.getElementById('preview');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(editHistory[index]);
      doc.close();
      iframe.onload = () => {
        bindMessageInteractions(doc);
        isRestoringHistory = false;
      };
      updateUndoRedoButtons();
    }

    function undoEdit() {
      if (editHistoryIndex > 0) restoreHistorySnapshot(editHistoryIndex - 1);
    }

    function redoEdit() {
      if (editHistoryIndex < editHistory.length - 1) restoreHistorySnapshot(editHistoryIndex + 1);
    }

    function updateUndoRedoButtons() {
      $('#undoBtn').prop('disabled', editHistoryIndex <= 0);
      $('#redoBtn').prop('disabled', editHistoryIndex >= editHistory.length - 1);
    }

    // ─── 이미지 설정 (아바타 일괄 미리보기 + 메시지 내 모든 이미지 단일 변경) ─────
    // splitHtmls 문자열 조각 안의 img src를 srcMap 기준으로 치환 (아바타/본문 삽입 이미지 전부 대상)
    function replaceImageSrcsInHtmlString(htmlStr, srcMap) {
      const parsed = new DOMParser().parseFromString(`<div>${htmlStr}</div>`, 'text/html');
      const container = parsed.body.firstChild;
      container.querySelectorAll('img').forEach(img => {
        const old = img.getAttribute('src');
        if (srcMap[old] !== undefined) img.setAttribute('src', srcMap[old]);
      });
      return container.innerHTML;
    }

    // 현재 iframe + 분할 저장된 나머지 구간까지 합쳐 avatar 이미지 src를 중복 없이 수집하고,
    // 각 src를 쓰는 화자(span.by 텍스트)도 같이 모아서 "이게 누구 아바타인지" 표시할 수 있게 한다.
    function getAllAvatarInfos() {
      const speakersBySrc = new Map(); // src -> Set(speaker name)

      function collect(root) {
        root.querySelectorAll('.message').forEach(message => {
          const img = message.querySelector('.avatar img');
          if (!img) return;
          const src = img.getAttribute('src');
          if (!src) return;
          if (!speakersBySrc.has(src)) speakersBySrc.set(src, new Set());
          const bySpan = message.querySelector('span.by');
          const speaker = bySpan ? bySpan.textContent.trim() : '';
          if (speaker) speakersBySrc.get(src).add(speaker);
        });
      }

      const iframe = document.getElementById('preview');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      collect(doc);

      Object.entries(splitHtmls).forEach(([key, html]) => {
        if (key === currentSplitKey) return; // 현재 화면은 이미 위에서 수집됨
        collect(new DOMParser().parseFromString(html, 'text/html'));
      });

      return Array.from(speakersBySrc.entries()).map(([src, speakers]) => ({
        src,
        speakers: Array.from(speakers)
      }));
    }

    let imageModalSingleTargetEl = null; // 단일 모드에서 클릭했던 실제 img 엘리먼트(iframe 내부)

    // singleSrc가 주어지면(아바타/desc 등 이미지 직접 클릭) 그 이미지 한 장만 편집하는 UI로 표시.
    // 단일 모드는 정사각형 썸네일 대신 상단에 큰 미리보기를 띄우고, "적용"(이 이미지만)과
    // "일괄적용"(같은 주소를 쓰는 전체) 버튼을 분리해서 보여준다.
    function openImageSettingsModal(singleSrc, targetEl) {
      imageModalSingleTargetEl = singleSrc ? (targetEl || null) : null;
      document.getElementById('imageModalApplyAllBtn').style.display = singleSrc ? '' : 'none';

      const entries = singleSrc ? [{ src: singleSrc, speakers: [] }] : getAllAvatarInfos();
      document.getElementById('imageModalTitle').textContent = singleSrc ? '이미지 변경' : '이미지 설정';
      const listEl = document.getElementById('imageModalList');
      listEl.innerHTML = '';

      if (entries.length === 0) {
        listEl.innerHTML = '<p style="font-size:12px;color:#6b7280;">이미지가 없습니다. 먼저 스타일을 적용해주세요.</p>';
        document.getElementById('imageModalOverlay').classList.remove('hidden');
        return;
      }

      if (singleSrc) {
        const preview = document.createElement('img');
        preview.className = 'image-modal-large-preview';
        preview.src = singleSrc;

        const input = document.createElement('input');
        input.type = 'text';
        input.value = singleSrc;
        input.dataset.originalSrc = singleSrc;
        input.addEventListener('input', () => {
          preview.src = input.value;
        });

        listEl.appendChild(preview);
        listEl.appendChild(input);
      } else {
        entries.forEach(({ src, speakers }) => {
          const row = document.createElement('div');
          row.className = 'modal-row';

          const thumb = document.createElement('div');
          thumb.className = 'modal-row-thumb';

          const img = document.createElement('img');
          img.src = src;

          const label = document.createElement('div');
          label.className = 'modal-row-label';
          label.textContent = speakers.length ? speakers.join(', ') : '이름 없음';
          label.title = label.textContent;

          thumb.append(img, label);

          const input = document.createElement('input');
          input.type = 'text';
          input.value = src;
          input.dataset.originalSrc = src;
          input.addEventListener('input', () => {
            img.src = input.value;
          });

          row.append(thumb, input);
          listEl.appendChild(row);
        });
      }

      document.getElementById('imageModalOverlay').classList.remove('hidden');
    }

    function closeImageSettingsModal() {
      document.getElementById('imageModalOverlay').classList.add('hidden');
      imageModalSingleTargetEl = null;
    }

    // 단일 모드 전용: 클릭했던 그 이미지 엘리먼트 하나만 바꾼다 (같은 주소를 쓰는 다른 메시지는 그대로 둠)
    function applySingleImageOnly() {
      if (!imageModalSingleTargetEl) {
        closeImageSettingsModal();
        return;
      }
      const input = document.querySelector('#imageModalList input[type="text"]');
      const newSrc = input ? input.value.trim() : '';
      if (newSrc) {
        imageModalSingleTargetEl.setAttribute('src', newSrc);
        saveCurrentSplitList();
      }
      closeImageSettingsModal();
    }

    // 목록에 있는 모든 항목을 "같은 원본 주소를 쓰는 곳 전부"에 일괄 반영 (분할된 다른 구간 포함)
    function applyImageSettings() {
      const rows = document.querySelectorAll('#imageModalList input[type="text"]');
      const srcMap = {};
      rows.forEach(input => {
        const original = input.dataset.originalSrc;
        const updated = input.value.trim();
        if (updated && updated !== original) {
          srcMap[original] = updated;
        }
      });

      if (Object.keys(srcMap).length === 0) {
        closeImageSettingsModal();
        return;
      }

      // 현재 미리보기(iframe)에 즉시 반영 (아바타 + 본문 삽입 이미지 전부 대상)
      const iframe = document.getElementById('preview');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.querySelectorAll('img').forEach(img => {
        const old = img.getAttribute('src');
        if (srcMap[old] !== undefined) img.setAttribute('src', srcMap[old]);
      });

      // 전체 로그(다른 분할 구간 포함)에 일괄 반영
      Object.keys(splitHtmls).forEach(key => {
        splitHtmls[key] = replaceImageSrcsInHtmlString(splitHtmls[key], srcMap);
      });

      // 현재 화면 내용을 doc 기준으로 다시 저장(수정된 src 반영)
      if (currentSplitKey) {
        saveCurrentSplitList();
      }

      closeImageSettingsModal();
    }

    let splitCount = 0; // 전역 변수로 선언

    function wrapHTML(innerHTML) {
      return `<!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Split</title>
    </head>
    <body>
    ${innerHTML}
    </body>
    </html>`;
    }

    function getCleanedIframeHTML() {
    const iframe = document.getElementById("preview");
    const doc = iframe.contentDocument || iframe.contentWindow.document;

    // ✅ 원본 훼손 방지를 위해 복제
    const clone = doc.documentElement.cloneNode(true);

    // ✅ 복제본에서 버튼들 제거
    clone.querySelectorAll('button.split-btn, button.css-btn, button.add-btn').forEach(btn => btn.remove());
    clone.querySelectorAll('button').forEach(btn => {
      if (btn.textContent === '✕') btn.remove();
    });

    return '<!DOCTYPE html>\n' + clone.outerHTML;
  }
    // iframe에 HTML 로드 (기존 스타일 적용은 따로 필요시)
    function loadHTMLtoIframe(html) {
       const iframe = document.getElementById('preview');

    function onLoad() {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      
      iframe.removeEventListener('load', onLoad);
      // iframe 내용 변경되면 스크롤 최상단으로
      iframe.contentWindow.scrollTo(0, 0);
    }

    iframe.addEventListener('load', onLoad);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();

    
    }

  </script>
</head>

<body>
  <div class="container">
    <div class="sidebar">
      <h2>껍질 미리-깐 롤20로그</h2>
      <p>
        오류/개선사항 문의: @waSANkku로 DM 후 멘션
      </p>
      <hr />

      <div id="editor" style="border: 1px solid #ccc; border-radius: 8px; overflow: hidden;"><textarea class="codemirror-textarea"></textarea></div>

      <div class="undo-redo-row">
        <button type="button" id="undoBtn" disabled>↶ 되돌리기 (Ctrl+Z)</button>
        <button type="button" id="redoBtn" disabled>↷ 앞으로가기 (Ctrl+Y)</button>
      </div>

      <div class="sidebar-tabs">
        <button type="button" class="sidebar-tab active" data-target="tab-narrator">서술자 설정</button>
        <button type="button" class="sidebar-tab" data-target="tab-style">스타일 설정</button>
      </div>

      <div id="tab-narrator" class="tab-panel">
        <label class="checkbox-label"><input type="checkbox" id="tableWidthCheckbox" checked /> 표 너비 맞추기</label>
        <label class="checkbox-label"><input type="checkbox" id="colorUnifyCheckbox" checked /> 내가 보낸 채팅 색상 통일</label>
        <label class="checkbox-label"><input type="checkbox" id="removeApiCheckbox" checked /> 사담 API 일괄제거</label>
        <label class="checkbox-label"><input type="checkbox" id="removeHiddenMessageCheckbox" checked /> 숨긴 메세지 일괄제거</label>
        <label>
          시스템 저널 명:
          <input type="text" id="systemJournalInput" />
        </label>
        <label>
          저널 일괄 삭제:
          <input type="text" id="ownerInput" />
        </label>
      </div>

      <div id="tab-style" class="tab-panel hidden">
        <label>
          줄 간격:
          <input type="number" id="paddingInput" value="1.5" min="0" />
        </label>
        <div class="color-row">
          <label>
            귓속말 배경색:
            <input type="color" id="whisperBColorInput" value="#dddddd" />
          </label>
          <label>
            귓속말 글자색:
            <input type="color" id="whisperColorInput" value="#000000" />
          </label>
        </div>
        <div class="color-row">
          <label>
            emas 배경색:
            <input type="color" id="emoteBColorInput" value="#d3cbb6" />
          </label>
          <label>
            emas 글자색:
            <input type="color" id="emoteColorInput" value="#653e10" />
          </label>
        </div>
        <button id="imageSettingsBtn" type="button">이미지 설정</button>
      </div>

      <div class="title">분할 목록</div>
      <ul id="splitList"></ul>

      <input type="text" id="filenameInput" placeholder="파일명 입력 (확장자 제외)" />

      <div class="button-group">
        <button id="applyStyleBtn">스타일 적용</button>
        <button id="copyHTMLBtn">HTML 복사</button>
        <div class="save-row">
          <select id="saveFormatSelect">
            <option value="html">HTML</option>
            <option value="txt">TXT</option>
          </select>
          <button id="saveBtn">저장</button>
        </div>
      </div>

    </div>

    <div class="preview">
      <iframe id="preview"></iframe>
    </div>
  </div>

  <div id="imageModalOverlay" class="modal-overlay hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="imageModalTitle">이미지 설정</h3>
        <button type="button" id="imageModalCloseBtn" class="modal-close">✕</button>
      </div>
      <div id="imageModalList" class="modal-list"></div>
      <div class="modal-footer">
        <button type="button" id="imageModalApplyAllBtn" style="display:none;">일괄적용</button>
        <button type="button" id="imageModalApplyBtn">적용</button>
      </div>
    </div>
  </div>

  <div id="cssModalOverlay" class="modal-overlay hidden">
    <div class="modal-panel modal-panel-wide">
      <div class="modal-header">
        <h3>CSS 편집</h3>
        <button type="button" id="cssModalCloseBtn" class="modal-close">✕</button>
      </div>
      <div class="css-preview-wrap">
        <iframe id="cssPreviewFrame" class="css-preview-frame"></iframe>
      </div>
      <div id="cssTargetSections" class="css-target-sections"></div>
      <div class="modal-footer">
        <button type="button" id="cssModalApplyAllBtn">일괄적용</button>
        <button type="button" id="cssModalApplyBtn">적용</button>
      </div>
    </div>
  </div>
</body>

</html>
