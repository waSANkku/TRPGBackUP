<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>껍질 미리-깐 코코포 로그</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            padding: 20px 18px;
            background-color: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h2 {
            margin: 0 0 4px;
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }

        .sidebar>p {
            margin: 0;
            font-size: 12px;
            line-height: 1.6;
            color: #6b7280;
        }

        .sidebar>p a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .sidebar>p a:hover {
            text-decoration: underline;
        }

        .sidebar>hr {
            margin: 8px 0 4px;
            border: 0;
            border-top: 1px solid #e5e7eb;
        }

        .preview {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: #1f1e22;
            color: white;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 9px 10px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            background-color: #ffffff;
            color: #111827;
            transition: background-color 0.15s, border-color 0.15s, box-shadow 0.15s;
        }

        button:hover {
            background-color: #f3f4f6;
            border-color: #2563eb;
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.25);
        }

        #channelFilter {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 40px;
            align-items: flex-start;
            align-content: flex-start;
        }

        #channelFilter button {
            background-color: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            color: #374151;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: fit-content;
        }

        #channelFilter button:hover {
            background-color: #f3f4f6;
        }

        #channelFilter button.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .sidebar-tabs {
            display: flex;
            margin-top: 10px;
            border-radius: 999px;
            padding: 2px;
            background-color: #e5e7eb;
            gap: 2px;
        }

        .sidebar-tab {
            flex: 1;
            padding: 6px 0;
            font-size: 12px;
            background-color: transparent;
            border: none;
            cursor: pointer;
            text-align: center;
            border-radius: 999px;
            color: #6b7280;
        }

        .sidebar-tab.active {
            background-color: #2563eb;
            color: #f9fafb;
        }

        .tab-panel {
            margin-top: 10px;
            padding: 10px 10px 8px;
            border-radius: 10px;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tab-panel.hidden {
            display: none;
        }

        /* sidebar form controls */
        label {
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #374151;
        }

        .sidebar input[type="text"],
        .sidebar input[type="number"],
        .sidebar input[type="color"] {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 12px;
            box-sizing: border-box;
            background-color: #ffffff;
            color: #111827;
        }

        .sidebar input[type="color"] {
            height: 36px;
            cursor: pointer;
        }

        .sidebar input[type="text"]::placeholder,
        .sidebar input[type="number"]::placeholder {
            color: #9ca3af;
        }

        .sidebar input[type="text"]:focus,
        .sidebar input[type="number"]:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.35);
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
        }

        /* tab-narrator modern layout */
        #tab-narrator {
            flex-direction: column;
            gap: 8px;
        }

        #tab-narrator label {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #tab-narrator label:last-child {
            flex-direction: row;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        #tab-narrator input[type="text"] {
            width: 100%;
            box-sizing: border-box;
        }

        #tab-narrator input[type="checkbox"] {
            width: auto;
        }

        /* tab-style 동일 스타일 */
        #tab-style label:last-child {
            flex-direction: row;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        #tab-style input[type="checkbox"] {
            width: auto;
        }

        p {
            margin: 0;
        }

        b {
            color: gray;
            font-size: 9pt;
            font-weight: 200;
        }

        span,
        b {
            font-size: 16px;
            font-family: 'Arial', sans-serif;
            line-height: 1.5;
        }

        .preview p,
        .preview span,
        .preview b {
            white-space: pre-wrap;
        }

        /* 기본 다크 배경 / 글꼴 색 (채널 색상 적용 전 초기 상태) */
        .preview .ccfolia_wrap {
            background-color: #1f1e22;
            color: #ddd;
        }

        b {
            font-weight: bold;
        }

        .ccfolia_wrap {
            position: relative;
            background-color: #2c2c2cde;
            color: #fefefe;
        }

        .msg_container {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msg_container img {
            width: 40px;
        }

        span:before {
            display: none !important;
        }


        .gap {
            gap: 15px;
            display: flex;
            -webkit-box-pack: start;
            justify-content: flex-start;
            align-items: flex-start;
            position: relative;
            text-decoration: none;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
            padding: 16px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        hr {
            display: none;
        }

        /* 전역 삭제 버튼 */
        #globalDeleteBtn {
            position: fixed;
            background: rgba(255, 50, 50, 0.8);
            border: none;
            color: white;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 9999;
            pointer-events: auto;
            width: 24px;
            height: 24px;
            font-size: 14px;
            line-height: 1;
        }

        .preview .gap:hover,
        .preview .player.system:hover {
            outline: 1px solid rgba(255, 50, 50, 0.3);
        }

        /* 비밀 메시지 뱃지 */
        .secret-badge {
            display: inline-block;
            background-color: #ffffff2b;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: normal;
            position: absolute;
            right: 16px;
            top: 8px;
            z-index: 10;
        }

        /* Light theme overrides */
        .preview.light {
            background-color: #f1f1f1;
            color: #000000;
        }

        .preview.light .ccfolia_wrap {
            background-color: #f9fafb !important;
        }

        .preview.light .gap {
            border-top-color: rgba(0, 0, 0, 0.1);
        }

        .preview.light p,
        .preview.light span {
            color: #575757 !important;
        }

        .preview.light .msg_container {
            background: transparent !important;
        }

        .preview.light .player.system {
            background: rgb(0 0 0 / 4%) !important;
            border-top-color: rgba(0, 0, 0, 0.1) !important;
        }

        .preview.light .player.system .Uname {
            background: #0000001c !important;
            color: #5a6671 !important;
        }

        .preview.light .player.system .Utext {
            color: #4b5563 !important;
        }

        .preview.light .secret-badge {
            background-color: #0000002b;
            color: #111827;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <h2>껍질 미리-깐 코코포 로그 v1.0.2</h2>
            <p style="font-size:10pt;">
                오류 발생시: @waSANkku로 DM
                <br />
                업데이트 내역 <a href="https://wakku0201.tistory.com/135" target="_blank">바로가기</a>
                <br />
                티스토리 비밀번호: waSANkku
                <br />
                <br />
                2025-08-08 수정 : 공개적인 장소에서 링크 업로드를 제외하면 지인 간 공유는 신경쓰지 않습니다. 편하게 사용해주세요!
                <br />
                (단 공개 장소에서 링크 공유 적발시 불시에 내리고 1차 지인 한정 공유로 전환)
            </p>
            <hr />
            <label>
                로그 HTML 업로드:
                <input type="file" id="htmlFileInput" accept=".html,.htm" />
            </label>
            <label>
                저장 파일명(선택):
                <input type="text" id="roomInput" placeholder="ccfolia-wrap" />
            </label>
            <div id="channelFilter" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;"></div>

            <div class="sidebar-tabs">
                <button type="button" class="sidebar-tab active" data-target="tab-narrator">서술자 설정</button>
                <button type="button" class="sidebar-tab" data-target="tab-style">스타일 설정</button>
            </div>

            <div id="tab-narrator" class="tab-panel">
                <label>
                    서술자 이름:
                    <input type="text" id="narratorInput" placeholder="이름 정확히 입력" />
                </label>
                <label style="flex-direction: row; align-items: center; gap: 6px;">
                    <input type="checkbox" id="removeNarratorItalicCheckbox" style="width:auto;" /> 서술자 기울임 제거
                </label>
            </div>

            <div id="tab-style" class="tab-panel hidden">
                <label style="flex-direction: row; align-items: center; gap: 6px;">
                    패딩 (상하 px):
                    <input type="number" id="paddingInput" value="16" min="0" />
                    폰트 크기 (px):
                    <input type="number" id="fontSizeInput" value="16" min="8" max="32" />
                </label>
                <div id="channelColorSettings">
                    <!-- 동적으로 채널별 색상 설정이 추가됩니다 -->
                </div>
                <label style="flex-direction: row; align-items: center; gap: 6px;">
                    <input type="checkbox" id="lightThemeToggle" /> 라이트 테마
                </label>
            </div>

            <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 6px;">
                <button id="applyStyleBtn">스타일 적용</button>
                <button id="saveHTMLBtn">HTML 저장</button>
                <button id="saveTxtBtn">TXT 저장</button>
            </div>

        </div>

        <div class="preview" id="previewArea"></div>
    </div>

    <button id="globalDeleteBtn">✕</button>

    <script>
        const previewArea = document.getElementById('previewArea');
        const styleButton = document.getElementById('applyStyleBtn');
        const paddingInput = document.getElementById('paddingInput');
        const fontSizeInput = document.getElementById('fontSizeInput');

        // 사이드바 탭 전환
        const sidebarTabs = document.querySelectorAll('.sidebar-tab');
        const tabPanels = document.querySelectorAll('.tab-panel');

        sidebarTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const targetId = tab.getAttribute('data-target');

                sidebarTabs.forEach(t => t.classList.remove('active'));
                tabPanels.forEach(panel => {
                    if (panel.id === targetId) {
                        panel.classList.remove('hidden');
                    } else {
                        panel.classList.add('hidden');
                    }
                });

                tab.classList.add('active');
            });
        });

        // 전역 삭제 버튼 로직
        const globalDeleteBtn = document.getElementById('globalDeleteBtn');
        let currentHoverGap = null;

        // 이벤트 위임 방식으로 변경
        document.addEventListener('mouseover', (e) => {
            const hovered = e.target.closest('.gap') || e.target.closest('.player.system');
            if (hovered && previewArea.contains(hovered)) {
                currentHoverGap = hovered;
                const rect = hovered.getBoundingClientRect();
                globalDeleteBtn.style.left = (rect.right - 30) + 'px';
                globalDeleteBtn.style.top = (rect.top + 5) + 'px';
                globalDeleteBtn.style.display = 'block';
            } else if (!e.target.closest('#globalDeleteBtn')) {
                // 버튼 위가 아니고 대상 위도 아니면 숨김
                if (currentHoverGap && !currentHoverGap.contains(e.target)) {
                    globalDeleteBtn.style.display = 'none';
                    currentHoverGap = null;
                }
            }
        });

        globalDeleteBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (currentHoverGap) {
                currentHoverGap.remove();
                globalDeleteBtn.style.display = 'none';
                currentHoverGap = null;
            }
        });

        // 버튼 위에 마우스가 있을 때 버튼 유지
        globalDeleteBtn.addEventListener('mouseenter', () => {
            if (currentHoverGap) {
                globalDeleteBtn.style.display = 'block';
            }
        });

        // 라이트 테마 토글
        const lightThemeToggle = document.getElementById('lightThemeToggle');
        
        // 저장된 채널 색상을 저장할 변수
        let savedChannelColors = {};
        
        lightThemeToggle.addEventListener('change', () => {
            if (lightThemeToggle.checked) {
                // 현재 채널 색상 저장
                const channelSet = new Set(window.allMessages.map(m => m.channel));
                channelSet.forEach(channel => {
                    const colorInput = document.getElementById(`channelColor_${channel}`);
                    if (colorInput) {
                        savedChannelColors[channel] = colorInput.value;
                    }
                });
                
                // 라이트 테마 색상으로 변경
                channelSet.forEach(channel => {
                    const colorInput = document.getElementById(`channelColor_${channel}`);
                    if (colorInput) {
                        // 메인 채널은 #f1f1f1, 이외는 #E3E3E3
                        const lightColor = (channel.includes('메인') || channel.includes('main')) ? '#f1f1f1' : '#E3E3E3';
                        colorInput.value = lightColor;
                    }
                });
                
                previewArea.classList.add('light');
            } else {
                // 저장된 원래 색상 복원
                const channelSet = new Set(window.allMessages.map(m => m.channel));
                channelSet.forEach(channel => {
                    const colorInput = document.getElementById(`channelColor_${channel}`);
                    if (colorInput && savedChannelColors[channel]) {
                        colorInput.value = savedChannelColors[channel];
                    }
                });
                
                previewArea.classList.remove('light');
            }
            
            // 메시지 다시 렌더링
            if (window.allMessages && window.allMessages.length > 0) {
                renderMessages();
            }
        });

        // 스타일 적용 버튼
        styleButton.addEventListener('click', () => {
            // Firestore 메시지가 로드되어 있으면 다시 렌더링
            if (window.allMessages && window.allMessages.length > 0) {
                renderMessages();
            } else {
                // HTML 파일 로드 방식일 경우
                applyStyleToPreviewArea();
            }
        });

        function applyStyleToPreviewArea() {
            const paddingValue = paddingInput.value || "16";
            const doc = previewArea;
            const narratorName = document.getElementById('narratorInput')?.value?.trim();

            // 배경색
            doc.querySelectorAll('.ccfolia_wrap').forEach(el => {
                el.style.backgroundColor = '#1f1e22';
            });

            // SYSTEM 형식 변환
            doc.querySelectorAll('.gap').forEach(old => {
                const systemSpan = old.querySelector('span[style*="font-weight: bold"]');
                if (!systemSpan || systemSpan.innerText.trim().toLowerCase() !== 'system') return;

                const p = old.querySelector('p');
                const spans = p.querySelectorAll('span');
                const message = spans[spans.length - 1]?.innerText.trim();

                const newDiv = document.createElement('div');
                newDiv.className = 'player system';
                newDiv.style.cssText = `
          display: flex;
          overflow: hidden;
          padding: 0px;
          border-top: 1px solid rgba(255, 255, 255, 0.08);
          background: #33313b;
          text-align: center;
          justify-content: center;
        `;

                newDiv.innerHTML = `
          <div class="infoWrap" style="display: none">
            <div class="imgWrap" style="width: 40px;height: 40px;overflow: hidden;background-color: rgba(0, 0, 0, 0.31);float: left;border-radius: 5px"></div>
          </div>
          <div class="textWrap" style="float: left;line-height: 1.6;margin-left: 0;color: #FFFFFF;padding: 10px 20px">
            <p class="Uname" style="margin: 0px 0px 6px 0px;font-weight: 800;color: #858296;font-size: 13px;letter-spacing: 1px;padding: 3px 8px;border-radius: 15px;background: #000000">system</p>
            <p class="Utext" style="margin: 0;font-weight: 400;color: #908e9a;font-size: 15px;letter-spacing: -1px">${message}</p>
          </div>
        `;
                old.replaceWith(newDiv);
            });

            // 패딩 적용
            doc.querySelectorAll('.gap').forEach(el => {
                if (!el.querySelector('.msg_container')) {
                    el.style.padding = `${paddingValue}px 16px`;
                }
            });

            // 더블클릭 편집
            doc.querySelectorAll('.gap span').forEach(span => {
                span.addEventListener('click', () => {
                    span.setAttribute('contenteditable', 'true');
                    span.focus();
                });
                span.addEventListener('blur', () => {
                    span.removeAttribute('contenteditable');
                });
                span.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        if (e.shiftKey) {
                            // Shift+Enter: 줄바꿈 허용
                            return;
                        } else {
                            // Enter만: 편집 완료
                            e.preventDefault();
                            span.blur();
                        }
                    }
                });
            });

            if (narratorName) applyNarratorMode(narratorName);
        }

        const saveButton = document.getElementById('saveHTMLBtn');
        saveButton.addEventListener('click', () => {
            const wrap = previewArea.querySelector('.ccfolia_wrap');
            if (!wrap) {
                alert('.ccfolia_wrap 요소를 찾을 수 없습니다.');
                return;
            }


            const doctype = '<!DOCTYPE html>';
            const htmlOpen = '<html lang="en">';
            const htmlClose = '</html>';
            const head = `
    <head>
      <meta charset="UTF-8">
      <title>ccfolia-wrap Export</title>
      <style>

    .ccfolia_wrap p{
    margin: 0;
    white-space: pre-wrap;
    }

    .ccfolia_wrap b{
    color: gray;
        font-size: 9pt;
        font-weight: 200;
    }

    .ccfolia_wrap span, .ccfolia_wrap b {
        font-size: 16px;
        font-family: 'Arial', sans-serif;
        line-height: 1.5;
        white-space: pre-wrap;
    }

    b {
        font-weight: bold;
    }

    .ccfolia_wrap {
    position: relative;
    background-color: #2c2c2cde;
    color: #fefefe;
    }
    .msg_container {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    }

    .msg_container img {
    width: 40px;
    }

    span:before {
    display: none !important ;
    }


    .gap{
    gap: 15px;
    display: flex;
    -webkit-box-pack: start;
    justify-content: flex-start;
    align-items: flex-start;

    padding: 16px 16px;

    }


        hr{
            display: none;
        }

        .secret-badge {
            display: inline-block;
            background-color: #ffffff2b;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: normal;
            position: absolute;
            right: 16px;
            top: 8px;
            z-index: 10;
        }

        .ccfolia_wrap.light .secret-badge {
            background-color: #0000002b;

        /* Light theme overrides */
        .ccfolia_wrap.light {

        }

            border-top-color: rgba(0, 0, 0, 0.1);
        }

        .ccfolia_wrap.light span {
            color: #575757 !important;
        }

        .ccfolia_wrap.light .msg_container {
            background: transparent !important;
        }

        .ccfolia_wrap.light .player.system {
            background: rgb(0 0 0 / 4%) !important;
            border-top-color: rgba(0, 0, 0, 0.1) !important;
        }

        .ccfolia_wrap.light .player.system .Uname {
            background: #0000001c !important;
            color: #5a6671 !important;
        }

        .ccfolia_wrap.light .player.system .Utext {
            color: #4b5563 !important;
        }
      </style>
    </head>
  `;

            const isLightTheme = document.getElementById('lightThemeToggle').checked;
            if (isLightTheme) {
                wrap.classList.add('light');
            }
            const body = `<body>${wrap.outerHTML}</body>`;
            if (isLightTheme) {

        async function loadFirestoreMessages() {
            const rawInput = document.getElementById('roomInput').value.trim();
            const roomId = extractRoomId(rawInput);
            if (!roomId) return alert('룸 ID를 입력해주세요.');

            const baseUrl = `https://firestore.googleapis.com/v1/projects/ccfolia-160aa/databases/(default)/documents/rooms/${roomId}/messages`;

            let allDocs = [];
            let pageToken = null;
            let page = 1;

            // 진행 상황 표시 영역
            previewArea.innerHTML = '<p style="color:#888;padding:20px;">메시지를 불러오는 중...</p>';

            try {
                while (true) {
                    const url = new URL(baseUrl);
                    url.searchParams.set('pageSize', '1000');
                    if (pageToken) {
                        url.searchParams.set('pageToken', pageToken);
                    }

                    const res = await fetch(url.toString());
                    const json = await res.json();

                    if (json.documents) {
                        allDocs = allDocs.concat(json.documents);
                        // 진행 상황 업데이트
                        previewArea.innerHTML = `<p style="color:#888;padding:20px;">페이지 ${page} 로딩 중... (${allDocs.length}개 메시지)</p>`;
                    }

                    if (!json.nextPageToken) break;
                    pageToken = json.nextPageToken;
                }

                if (allDocs.length === 0) {
                    previewArea.innerHTML = '<p style="color:red;">메시지를 불러올 수 없습니다.</p>';
                    return;
                }

                const sorted = allDocs.sort((a, b) => {
                    const aTime = a.fields.createdAt?.timestampValue || '';
                    const bTime = b.fields.createdAt?.timestampValue || '';
                    return new Date(aTime) - new Date(bTime); // 오래된 → 최신
                });

                window.allMessages = sorted.map(doc => {
                    const f = doc.fields;

                    // 주사위 결과 추출 시도
                    let rollResult = "";
                    try {
                        rollResult = f.extend?.mapValue?.fields?.roll?.mapValue?.fields?.result?.stringValue || "";
                    } catch (e) {
                        rollResult = "";
                    }

                    // 채널명 정규화: "メイン"을 "메인"으로 통일
                    let channelName = f.channelName?.stringValue ?? "기타";
                    if (channelName === "メイン") {
                        channelName = "메인";
                    }

                    // 포트레이트 우선순위: extend.portrait.url > iconUrl
                    let iconUrl = "";
                    try {
                        iconUrl = f.extend?.mapValue?.fields?.portrait?.mapValue?.fields?.url?.stringValue
                            || f.iconUrl?.stringValue
                            || "";
                    } catch (e) {
                        iconUrl = f.iconUrl?.stringValue ?? "";
                    }

                    return {
                        name: f.name?.stringValue ?? "이름 없음",
                        text: f.text?.stringValue + (rollResult ? ` > ${rollResult}` : "") ?? "",
                        icon: iconUrl,
                        color: f.color?.stringValue ?? "#ccc",
                        channel: channelName
                    };
                });

                // 초기 로딩 시 메인 채널만 선택
                window.selectedChannels = new Set(["메인"]);
                renderChannelFilter();
                createChannelColorSettings();
                renderMessages();

            } catch (e) {
                console.error(e);
                previewArea.innerHTML = `<p style="color:red;">에러 발생: ${e.message}</p>`;
            }
        }

        function renderChannelFilter() {
            const channelSet = new Set(window.allMessages.map(m => m.channel));

            // 전체 버튼
            const allBtn = document.createElement('button');

        function toggleAllChannels() {

                narratorName: document.getElementById('narratorInput')?.value ?? '',
                removeItalic: document.getElementById('removeNarratorItalicCheckbox')?.checked ?? false,
                padding: document.getElementById('paddingInput')?.value ?? '16',
                fontSize: document.getElementById('fontSizeInput')?.value ?? '16',
                lightTheme: document.getElementById('lightThemeToggle')?.checked ?? false,
            };
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
        }

        function loadSettings() {
            const raw = localStorage.getItem(SETTINGS_KEY);
            if (!raw) return;
            try {
                const s = JSON.parse(raw);
                if (s.narratorName != null) document.getElementById('narratorInput').value = s.narratorName;
                document.getElementById('removeNarratorItalicCheckbox').checked = s.removeItalic ?? false;
                if (s.padding != null) document.getElementById('paddingInput').value = s.padding;
                if (s.fontSize != null) document.getElementById('fontSizeInput').value = s.fontSize;
                const lightToggle = document.getElementById('lightThemeToggle');
                lightToggle.checked = s.lightTheme ?? false;
                if (lightToggle.checked) previewArea.classList.add('light');
            } catch (e) {
                console.warn('설정 불러오기 실패:', e);
            }
        }

        function saveChannelSettings() {
            const channelSet = new Set(window.allMessages.map(m => m.channel));
            const s = {};
            channelSet.forEach(channel => {
                s[channel] = {
                    color: document.getElementById(`channelColor_${channel}`)?.value,
                    badge: document.getElementById(`channelBadge_${channel}`)?.checked,
                };
            });
            localStorage.setItem(CHANNEL_SETTINGS_KEY, JSON.stringify(s));
        }

        function restoreChannelSettings() {
            const raw = localStorage.getItem(CHANNEL_SETTINGS_KEY);
            if (!raw) return;
            try {
                const s = JSON.parse(raw);
                Object.entries(s).forEach(([channel, cs]) => {
                    const colorEl = document.getElementById(`channelColor_${channel}`);
                    if (colorEl && cs.color) colorEl.value = cs.color;
                    const badgeEl = document.getElementById(`channelBadge_${channel}`);
                    if (badgeEl && cs.badge != null) badgeEl.checked = cs.badge;
                });
            } catch (e) {
                console.warn('채널 설정 불러오기 실패:', e);
            }
        }

        // 정적 입력 자동 저장
        ['narratorInput', 'paddingInput', 'fontSizeInput'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', saveSettings);
        });
        ['removeNarratorItalicCheckbox', 'lightThemeToggle'].forEach(id => {
            document.getElementById(id)?.addEventListener('change', saveSettings);
        });

        loadSettings();

        // ─── HTML 업로드 → 파싱 (확장 뷰어 출력 형식) ───────────────
        // 편집 완료 표식 제거
        const stripEdited = (s) => (s || '').replace(/(\s*\[편집\s*완료\])+\s*$/, '').trim();

        function parseViewerHTML(htmlString) {
            const doc = new DOMParser().parseFromString(htmlString, 'text/html');
            // 신규 경량 구조(.m) 우선, 없으면 레거시(.MUI [data-index]) 폴백
            const compact = doc.querySelectorAll('.m');
            const msgs = [];

            if (compact.length) {
                compact.forEach(x => {
                    const nm = x.querySelector('.nm');
                    let name = '', color = '';
                    if (nm) {
                        for (const n of nm.childNodes) if (n.nodeType === 3) name += n.textContent;
                        name = name.trim();
                        color = nm.style.color || '';
                    }
                    const tx = x.querySelector('.tx');
                    let text = '';
                    if (tx) {
                        const clone = tx.cloneNode(true);
                        clone.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
                        text = stripEdited(clone.textContent);
                    }
                    const img = x.querySelector('img.av') || x.querySelector('img');
                    const icon = img ? (img.getAttribute('src') || '') : '';
                    if (x.classList.contains('sys') || name.toLowerCase() === 'system') {
                        msgs.push({ name: 'system', text, icon: '', color: '#ccc', channel: '메인' });
                        return;
                    }
                    if (!name) name = icon ? '이름 없음' : 'system';
                    if (text === '') return;
                    msgs.push({ name, text, icon, color: color || '#ccc', channel: '메인' });
                });
                return msgs;
            }

            // 레거시 구조
            const items = doc.querySelectorAll('[data-index]');
            items.forEach(x => {
                const h6 = x.querySelector('h6');
                let name = '', color = '';
                if (h6) {
                    for (const n of h6.childNodes) if (n.nodeType === 3) name += n.textContent;
                    name = name.trim();
                    color = h6.style.color || '';
                }
                const p = x.querySelector('p');
                const text = stripEdited(p ? p.textContent : '');
                const img = x.querySelector('.MuiListItemAvatar-root img') || x.querySelector('img');
                const icon = img ? (img.getAttribute('src') || '') : '';
                if (!name) name = icon ? '이름 없음' : 'system';
                if (text === '' && name.toLowerCase() !== 'system') return;
                msgs.push({ name, text, icon, color: color || '#ccc', channel: '메인' });
            });
            return msgs;
        }

        function loadFromHTMLFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const msgs = parseViewerHTML(e.target.result);
                    if (!msgs.length) {
                        previewArea.innerHTML = '<p style="color:red;padding:20px;">메시지를 찾지 못했습니다. (확장 뷰어 형식의 HTML인지 확인하세요)</p>';
                        return;
                    }
                    window.allMessages = msgs;
                    window.selectedChannels = new Set(); // 단일 채널 → 전체 표시
                    renderChannelFilter();
                    createChannelColorSettings();
                    renderMessages(); // renderMessages가 시스템/서술자/패딩/배경/편집까지 전부 처리
                } catch (err) {
                    console.error(err);
                    previewArea.innerHTML = `<p style="color:red;padding:20px;">파싱 오류: ${err.message}</p>`;
                }
            };
            reader.onerror = () => { previewArea.innerHTML = '<p style="color:red;padding:20px;">파일 읽기 실패</p>'; };
            reader.readAsText(file, 'UTF-8');
        }

        document.getElementById('htmlFileInput')?.addEventListener('change', (e) => {
            const file = e.target.files && e.target.files[0];
            if (file) loadFromHTMLFile(file);
        });
    </script>
</body>

</html>
